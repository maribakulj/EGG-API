version: 2

updates:
  # Python runtime + dev dependencies.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps are reviewed manually: they tend to break contracts
      # (Pydantic, FastAPI, httpx) and deserve a dedicated PR.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions used in CI / release workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Paris"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
      include: scope

  # Docker base image pinning.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(docker)"
      include: scope
