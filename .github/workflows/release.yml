name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Only the main repo can push to its container registry; forks that push
# a tag still run lint/tests but skip the image upload step.
permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag matches pyproject + full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project (dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check tag matches pyproject.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject version ${pyproject_version}"
            exit 1
          fi

      - name: Ruff lint + format
        run: |
          ruff check .
          ruff format --check .

      - name: mypy
        run: mypy

      - name: Pytest (full suite, coverage gate)
        run: pytest

  wheel:
    name: Build wheel + sdist
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Build + push Docker image
    needs: verify
    runs-on: ubuntu-latest
    # Skip on forks without a GHCR token.
    if: ${{ github.repository_owner == 'maribakulj' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/egg-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/egg-api:latest
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true

  github-release:
    name: Create GitHub release
    needs: [wheel, docker]
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'maribakulj' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          # Extract the block between "## [tag_version]" and the next "## ["
          # so the release notes mirror what the CHANGELOG says.
          awk -v v="$tag_version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            flag && $0 ~ "^## \\[" { flag=0 }
            flag { print }
          ' CHANGELOG.md > release-body.md
          echo "body_path=release-body.md" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.body_path }}
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
