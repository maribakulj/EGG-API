name: Release

on:
  push:
    tags:
      - "v*.*.*"

# Only the main repo can push to its container registry; forks that push
# a tag still run lint/tests but skip the image upload step.
permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify tag matches pyproject + full test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install project (dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check tag matches pyproject.toml version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject version ${pyproject_version}"
            exit 1
          fi

      - name: Ruff lint + format
        run: |
          ruff check .
          ruff format --check .

      - name: mypy
        run: mypy

      - name: Pytest (full suite, coverage gate)
        run: pytest

  wheel:
    name: Build wheel + sdist
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  docker:
    name: Build + push Docker image
    needs: verify
    runs-on: ubuntu-latest
    # Skip on forks without a GHCR token.
    if: ${{ github.repository_owner == 'maribakulj' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/egg-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/egg-api:latest
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true

  desktop:
    name: Desktop installers (${{ matrix.name }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            briefcase_target: macOS app
            artifact_glob: "dist/**/*.pkg"
          - name: Windows
            runner: windows-latest
            briefcase_target: windows MSI
            artifact_glob: "dist/**/*.msi"
          - name: Linux
            runner: ubuntu-latest
            briefcase_target: linux -p AppImage
            artifact_glob: "dist/**/*.AppImage"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system packages for WebKitGTK
        if: matrix.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libwebkit2gtk-4.1-dev \
            gir1.2-webkit2-4.1

      - name: Install Briefcase
        run: |
          python -m pip install --upgrade pip
          python -m pip install briefcase

      - run: briefcase create ${{ matrix.briefcase_target }}
      - run: briefcase build ${{ matrix.briefcase_target }}
      - run: briefcase package ${{ matrix.briefcase_target }} --adhoc-sign

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    needs: [wheel, docker, desktop]
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'maribakulj' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download wheel + sdist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Download desktop installers
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: desktop/
          merge-multiple: true

      - name: Assemble release assets
        run: |
          mkdir -p release-assets
          cp dist/*.whl dist/*.tar.gz release-assets/ 2>/dev/null || true
          find desktop -type f \( -name "*.pkg" -o -name "*.msi" -o -name "*.AppImage" \) \
            -exec cp {} release-assets/ \;
          # Produce a SHA256SUMS file alongside the binaries so
          # operators can verify unsigned installers out-of-band.
          cd release-assets && sha256sum * > SHA256SUMS

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          # Extract the block between "## [tag_version]" and the next "## ["
          # so the release notes mirror what the CHANGELOG says.
          awk -v v="$tag_version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            flag && $0 ~ "^## \\[" { flag=0 }
            flag { print }
          ' CHANGELOG.md > release-body.md
          echo "body_path=release-body.md" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.body_path }}
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
