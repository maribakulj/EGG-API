{% extends "base.html" %}
{% block content %}
<section>
  <h2>Admin sign in</h2>
  <p>Use your admin API key to access the web console.</p>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/login">
    <label for="api_key">Admin API key</label>
    <input id="api_key" name="api_key" type="password" required />
    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
