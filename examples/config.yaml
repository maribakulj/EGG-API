backend:
  type: elasticsearch
  url: http://localhost:9200
  index: records
security_profile: prudent
auth:
  public_mode: anonymous_allowed
allowed_sorts:
  - relevance
  - date_desc
  - date_asc
  - title_asc
allowed_facets:
  - type
  - language
  - collection
  - institution
  - subject
allowed_include_fields:
  - id
  - type
  - title
  - description
  - creators
mapping:
  id:
    source: id
    mode: direct
    criticality: required
  type:
    source: type
    mode: first_non_empty
    sources: [type, format]
    criticality: required
  title:
    source: title
    mode: direct
    criticality: recommended
  creators:
    source: creator_csv
    mode: split_list
    separator: ";"
    criticality: optional
  links:
    source: links
    mode: nested_object
    criticality: optional
