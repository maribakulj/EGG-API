backend:
  type: elasticsearch
  url: http://localhost:9200
  index: records
  timeout_seconds: 15.0
  max_retries: 2
  retry_backoff_seconds: 0.2

storage:
  sqlite_path: data/pisco_state.sqlite3

security_profile: prudent
profiles:
  prudent:
    allow_empty_query: false
    page_size_default: 20
    page_size_max: 50
    max_facets: 3
    max_buckets_per_facet: 20
    allow_raw_fields: false
    allow_debug_translation: false
    max_depth: 2000
  standard:
    allow_empty_query: false
    page_size_default: 20
    page_size_max: 100
    max_facets: 5
    max_buckets_per_facet: 50
    allow_raw_fields: false
    allow_debug_translation: false
    max_depth: 2000

auth:
  public_mode: anonymous_allowed  # anonymous_allowed | api_key_optional | api_key_required
  # bootstrap_admin_key: intentionally NOT set here — provide it via
  # PISCO_BOOTSTRAP_ADMIN_KEY or let the service generate a one-time
  # key on first start (see data/bootstrap_admin.key). The value is
  # stripped from the YAML on every save() to avoid secret leakage.
  admin_cookie_secure: true
  admin_cookie_samesite: strict
  admin_session_ttl_hours: 12

cors:
  mode: off  # off | allowlist | wide_open
  allow_origins: []
  allow_methods: ["GET"]
  allow_headers: ["x-api-key", "content-type"]

cache:
  enabled: true
  public_max_age_seconds: 60

rate_limit:
  public_max_requests: 60
  public_window_seconds: 60
  admin_login_max_requests: 10
  admin_login_window_seconds: 300

allowed_sorts:
  - relevance
  - date_desc
  - date_asc
  - title_asc

allowed_facets:
  - type
  - language
  - collection
  - institution
  - subject

allowed_include_fields:
  - id
  - type
  - title
  - description
  - creators

mapping:
  id:
    source: id
    mode: direct
    criticality: required
  type:
    source: type
    mode: direct
    criticality: required
  title:
    source: title
    mode: direct
  description:
    source: description
    mode: direct
  creators:
    source: creator_csv
    mode: split_list
    separator: ";"
