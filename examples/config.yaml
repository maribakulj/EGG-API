backend:
  type: elasticsearch
  url: http://localhost:9200
  index: records
  timeout_seconds: 15.0
  max_retries: 2
  retry_backoff_seconds: 0.2
  # Authenticate to the search backend. Mode "none" (the default) means
  # no credentials. For ES 8+ with security enabled, pick one of:
  #   mode: basic         (username + password or password_env)
  #   mode: bearer        (token or token_env)
  #   mode: api_key       (base64 "id:key" token or token_env)
  # Inline ``password`` / ``token`` are accepted in memory (e.g. via
  # PUT /admin/v1/config) but are stripped from the YAML on save — use
  # ``password_env`` / ``token_env`` to keep the secret off disk.
  auth:
    mode: none
    # username: elastic
    # password_env: EGG_BACKEND_PASSWORD

storage:
  sqlite_path: data/egg_state.sqlite3

# Sprint 23: shape of the public Record. Change to ``museum`` to expose
# the museum sub-block (inventory number, artist, medium, dimensions,
# acquisition date, current location) and enable the IIIF passthrough at
# ``/v1/manifest/{id}`` when ``links.iiif_manifest`` is mapped.
schema_profile: library  # library | museum | archive | custom

security_profile: prudent
profiles:
  prudent:
    allow_empty_query: false
    page_size_default: 20
    page_size_max: 50
    max_facets: 3
    max_buckets_per_facet: 20
    allow_raw_fields: false
    allow_debug_translation: false
    max_depth: 2000
  standard:
    allow_empty_query: false
    page_size_default: 20
    page_size_max: 100
    max_facets: 5
    max_buckets_per_facet: 50
    allow_raw_fields: false
    allow_debug_translation: false
    max_depth: 2000

auth:
  public_mode: anonymous_allowed  # anonymous_allowed | api_key_optional | api_key_required
  # bootstrap_admin_key: intentionally NOT set here — provide it via
  # EGG_BOOTSTRAP_ADMIN_KEY or let the service generate a one-time
  # key on first start (see data/bootstrap_admin.key). The value is
  # stripped from the YAML on every save() to avoid secret leakage.
  admin_cookie_secure: true
  admin_cookie_samesite: strict
  admin_session_ttl_hours: 12

proxy:
  # IP addresses of trusted reverse-proxy hops. Only set this if EGG-API
  # sits behind nginx/Traefik/Caddy; otherwise an attacker could forge
  # X-Forwarded-For and bypass per-IP rate limits.
  trusted_proxies: []
  # Host names the app will answer to. Empty = accept any Host header
  # (fine for local dev). In production behind a shared proxy, pin this
  # to the externally-advertised name(s), e.g. ["egg.example.org"].
  allowed_hosts: []

cors:
  mode: off  # off | allowlist | wide_open
  allow_origins: []
  allow_methods: ["GET"]
  allow_headers: ["x-api-key", "content-type"]

cache:
  enabled: true
  public_max_age_seconds: 60

rate_limit:
  public_max_requests: 60
  public_window_seconds: 60
  admin_login_max_requests: 10
  admin_login_window_seconds: 300

allowed_sorts:
  - relevance
  - date_desc
  - date_asc
  - title_asc

allowed_facets:
  - type
  - language
  - collection
  - institution
  - subject

allowed_include_fields:
  - id
  - type
  - title
  - description
  - creators

mapping:
  id:
    source: id
    mode: direct
    criticality: required
  type:
    source: type
    mode: direct
    criticality: required
  title:
    source: title
    mode: direct
  description:
    source: description
    mode: direct
  creators:
    source: creator_csv
    mode: split_list
    separator: ";"
