backend:
  type: elasticsearch
  url: http://localhost:9200
  index: records

storage:
  sqlite_path: data/pisco_state.sqlite3

security_profile: prudent
auth:
  public_mode: anonymous_allowed
  bootstrap_admin_key: admin-change-me

allowed_sorts:
  - relevance
  - date_desc
  - date_asc
  - title_asc

allowed_facets:
  - type
  - language
  - collection
  - institution
  - subject

allowed_include_fields:
  - id
  - type
  - title
  - description
  - creators

mapping:
  id:
    source: id
    mode: direct
    criticality: required
  type:
    source: type
    mode: direct
    criticality: required
  title:
    source: title
    mode: direct
  description:
    source: description
    mode: direct
  creators:
    source: creator_csv
    mode: split_list
    separator: ";"
